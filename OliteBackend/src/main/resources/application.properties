spring.application.name=Olitebackend

# Conexiµn base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/olite_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234

# Configuraciµn de Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Puerto del servidor
server.port=8080

# JWT
jwt.secret=OliteSecretKey2024OliteSecretKey2024OliteSecretKey2024
jwt.expiration=86400000
